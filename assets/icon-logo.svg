<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ═══ BUCHIDA LOGO — Full Mascot (120×120) ═══ -->
  <!-- Red mailbox body -->
  <rect x="25" y="35" width="70" height="55" rx="8" fill="#FF6B6B" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Mailbox top (darker red) -->
  <path d="M25 43C25 38.58 28.58 35 33 35H87C91.42 35 95 38.58 95 43V55H25V43Z" fill="#E84D3D" stroke="#1A1A1A" stroke-width="3"/>
  <!-- Mail slot -->
  <rect x="38" y="42" width="44" height="6" rx="3" fill="#1A1A1A"/>
  <!-- Flag pole + flag (airmail blue) -->
  <rect x="95" y="45" width="6" height="25" rx="2" fill="#3B6EF9" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M101 45H115V57H101" fill="#3B6EF9" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Googly eyes -->
  <circle cx="47" cy="72" r="12" fill="white" stroke="#1A1A1A" stroke-width="3"/>
  <circle cx="73" cy="72" r="12" fill="white" stroke="#1A1A1A" stroke-width="3"/>
  <circle cx="50" cy="71" r="6" fill="#1A1A1A"/>
  <circle cx="76" cy="71" r="6" fill="#1A1A1A"/>
  <circle cx="52" cy="69" r="2" fill="white"/>
  <circle cx="78" cy="69" r="2" fill="white"/>
  <!-- Legs -->
  <rect x="40" y="90" width="8" height="20" rx="4" fill="#1A1A1A"/>
  <rect x="72" y="90" width="8" height="20" rx="4" fill="#1A1A1A"/>
  <!-- Letter peeking out -->
  <rect x="50" y="28" width="28" height="18" rx="3" fill="#FFF8F0" stroke="#1A1A1A" stroke-width="2" transform="rotate(-8 55 30)"/>
  <path d="M52 30L64 38L76 30" stroke="#1A1A1A" stroke-width="1.5" stroke-linecap="round" transform="rotate(-8 55 30)"/>
</svg>